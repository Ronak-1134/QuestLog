<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ─────────────────────────────────────────────── -->
    <title>QuestLog — Track Your Games. Know Your Time.</title>
    <meta name="description"
      content="QuestLog is a minimalist gaming platform to track completion times, sync your Steam library, and visualize playtime data. Powered by community submissions." />
    <meta name="keywords"
      content="how long to beat, game completion time, game tracker, steam library sync, backlog tracker, gaming platform" />
    <meta name="author"     content="QuestLog" />
    <meta name="robots"     content="index, follow" />
    <link rel="canonical"   href="https://questlog.gg" />

    <!-- ── Open Graph ─────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://questlog.gg" />
    <meta property="og:title"       content="QuestLog — Track Your Games. Know Your Time." />
    <meta property="og:description" content="Community-sourced completion times, Steam sync, and playtime analytics. Free forever." />
    <meta property="og:image"       content="https://questlog.gg/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="QuestLog" />

    <!-- ── Twitter Card ───────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@questlog" />
    <meta name="twitter:title"       content="QuestLog — Track Your Games. Know Your Time." />
    <meta name="twitter:description" content="Community-sourced completion times, Steam sync, and playtime analytics." />
    <meta name="twitter:image"       content="https://questlog.gg/og-image.png" />

    <!-- ── Favicon ────────────────────────────────────────────────── -->
    <link rel="icon"             type="image/svg+xml"   href="/favicon.svg" />
    <link rel="icon"             type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180"        href="/apple-touch-icon.png" />
    <link rel="manifest"                                href="/site.webmanifest" />
    <meta name="theme-color"    content="#080808" />
    <meta name="color-scheme"   content="dark" />

    <!-- ── Preconnect ─────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.igdb.com" />

    <!-- ── Fonts ──────────────────────────────────────────────────── -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Geist:wght@300;400;500;600&display=swap"
          rel="stylesheet" />

    <!-- ── Structured data ────────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "QuestLog",
      "url": "https://questlog.gg",
      "description": "Community-sourced game completion times, Steam library sync, and playtime analytics.",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
